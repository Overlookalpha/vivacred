
<!DOCTYPE html>
<html>
<head>
  <title>VivaCred - Painel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    .header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 18px;
      letter-spacing: 2px;
      opacity: 0.7;
    }

    .logout {
      background: #ef4444;
      border: none;
      padding: 8px 15px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .container {
      padding: 30px;
      max-width: 500px;
      margin: auto;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 25px;
      border-radius: 16px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .score-value {
      font-size: 40px;
      font-weight: bold;
    }

    .limit {
      font-size: 24px;
      margin-top: 10px;
    }

    .btn-credit {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
    }

    .email {
      opacity: 0.7;
      font-size: 14px;
    }
    .modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.modal-content {
  background: #1e1e1e;
  padding: 20px;
  border-radius: 10px;
  width: 90%;
  max-width: 400px;
  color: white;
}

.modal-content label {
  display: block;
  margin-bottom: 10px;
}
.hero-score {
  margin-top: 30px;
  padding: 40px 20px;
  border-radius: 20px;
  background: radial-gradient(circle at top left, #0f2027, #0a0f1c 70%);
  box-shadow: 0 20px 60px rgba(0, 255, 200, 0.15);
  text-align: center;
}

.hero-title {
  font-size: 12px;
  letter-spacing: 3px;
  opacity: 0.6;
}

.hero-number {
  font-size: 72px;
  font-weight: 800;
  margin-top: 10px;
  background: linear-gradient(90deg, #00ffc3, #00c853);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero-level {
  margin-top: 10px;
  font-size: 16px;
  opacity: 0.8;
}

.hero-progress {
  margin: 25px auto 10px auto;
  height: 10px;
  width: 80%;
  background: rgba(255,255,255,0.08);
  border-radius: 10px;
  overflow: hidden;
}

.hero-progress-fill {
  height: 10px;
  width: 20%;
  background: linear-gradient(90deg, #00ffc3, #00c853);
  transition: 0.4s;
}

.hero-text {
  font-size: 13px;
  opacity: 0.6;
  margin-top: 15px;
}
  </style>
</head>

<body>

  <div class="header">
    <div class="logo">VIVACRED</div>
    <button id="logoutBtn" class="logout">Sair</button>
  </div>

  <div class="container">

    
    <div class="card">
      <div id="userEmail" class="email"></div>
    </div>

    <div id="areaAvisoTopo"></div>
    
  <div class="hero-score">
  <div class="hero-inner">

    <div class="hero-title">VIVACRED SCORE</div>

    <div class="hero-number" id="scoreValor">20</div>

   <div class="hero-level" id="nivelTexto"></div>

    <p id="limiteNivelTexto"></p>

    <div class="hero-progress">
      <div class="hero-progress-fill" id="scoreBar"></div>
    </div>
     <p id="progressoNivelTexto" style="color: white; margin-top: 10px;"></p>
     <p id="faltamPontosTexto" style="color: #9BE8C7; font-size: 14px;"></p>
    <div class="hero-text">
      Quanto melhor seu histórico, maior seu limite.
    </div>

  </div>
</div>

    <div class="card">
      <div>Limite Disponível</div>
      <div class="limit" id="limiteDisponivel">R$ 100,00</div>

     <button id="btnSolicitar" class="btn-credit">
     Solicitar Crédito
     </button>
    </div>
     <div class="card">
  <div><strong>Meus Empréstimos</strong></div>
  <div id="listaEmprestimos" style="margin-top:15px; font-size:14px;">
    Carregando...
  </div>
</div>
  </div>
 <div id="modalCredito" class="modal">
  <div class="modal-content">
   <h3>Simulação de Crédito</h3>

<p id="limiteInfo"></p>

<label>Valor desejado:</label>
<input type="number" id="valorSimulado" placeholder="Digite o valor" />

<br><br>

<label>Parcelas:</label>
<select id="parcelasSelect"></select>

<br><br>

<div id="resultadoSimulacao" style="margin-top:15px;"></div>

    <br><br>

    <button id="confirmarCredito">Confirmar Solicitação</button>
    <button id="fecharModal">Cancelar</button>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {  
  getFirestore, 
  doc, 
  getDoc,
  updateDoc,
  setDoc, 
  addDoc, 
  collection,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import { 
  getAuth, 
  onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
const firebaseConfig = {
  apiKey: "AIzaSyDJHtQp7OUxgYqtcD_2eTqzh1BRpufvKrY",
  authDomain: "vivacred-5a5b8.firebaseapp.com",
  projectId: "vivacred-5a5b8",
  storageBucket: "vivacred-5a5b8.firebasestorage.app",
  messagingSenderId: "932933359706",
  appId: "1:932933359706:web:59fd16618feea3b2fa6063"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.replace("login.html");
    return;
  }

  document.getElementById("userEmail").innerText =
    "Logado como: " + user.email;

  const userRef = doc(db, "usuarios", user.uid);
  const adminRef = doc(db, "admins", user.uid);
  const adminSnap = await getDoc(adminRef);

  if (adminSnap.exists()) {
    console.log("Usuário é ADMIN");
    document.body.style.border = "4px solid red";
  }

  const userSnap = await getDoc(userRef);
 function calcularNivel(score) {

  if (score <= 20) {
    return {
      nome: "Essencial",
      emoji: "🍀",
      max: 300,
      cor: "#7ED957"
    };
  }
  else if (score <= 40) {
    return {
      nome: "Bronze",
      emoji: "🥉",
      max: 800,
      cor: "#CD7F32"
    };
  }
  else if (score <= 60) {
    return {
      nome: "Prata",
      emoji: "🥈",
      max: 1500,
      cor: "#C0C0C0"
    };
  }
  else if (score <= 80) {
    return {
      nome: "Ouro",
      emoji: "🥇",
      max: 3000,
      cor: "#FFD700"
    };
  }
  else {
    return {
      nome: "Black",
      emoji: "💎",
      max: 5000,
      cor: "#6A0DAD"
    };
  }

}
  if (!userSnap.exists()) {

    await setDoc(userRef, {
      email: user.email,
      score: 20,
      limiteBase: 100,
      status: "ativlo",
      criadoEm: new Date()
    });

    console.log("Usuário criado no Firestore");

  } else {

    console.log("Usuário já existe");

 const data = userSnap.data();
const dadosNivel = calcularNivel(data.score);

const nivelNome = dadosNivel.nome;
const nivelEmoji = dadosNivel.emoji;
const nivelCor = dadosNivel.cor;
const limiteMaximoNivel = dadosNivel.max;

const nivelTexto = document.getElementById("nivelTexto");
const limiteNivelTexto = document.getElementById("limiteNivelTexto");
const scoreBar = document.getElementById("scoreBar");
const progressoNivelTexto = document.getElementById("progressoNivelTexto");
const faltamPontosTexto = document.getElementById("faltamPontosTexto");

if (nivelTexto) {
  nivelTexto.innerText = `Nível: ${nivelEmoji} ${nivelNome}`;
}
    
if (scoreBar) {
  let progressoNivel = 0;

  if (data.score <= 20) {
    progressoNivel = (data.score / 20) * 100;
  } 
  else if (data.score <= 40) {
    progressoNivel = ((data.score - 20) / 20) * 100;
  } 
  else if (data.score <= 60) {
    progressoNivel = ((data.score - 40) / 20) * 100;
  } 
  else if (data.score <= 80) {
    progressoNivel = ((data.score - 60) / 20) * 100;
  } 
  else {
    progressoNivel = ((data.score - 80) / 20) * 100;
  }

  scoreBar.style.width = progressoNivel + "%";
  scoreBar.style.background = nivelCor;
}

/* ===== NOVA PARTE ===== */

let inicioFaixa = 0;
let fimFaixa = 20;

if (data.score <= 20) {
  inicioFaixa = 0;
  fimFaixa = 20;
} 
else if (data.score <= 40) {
  inicioFaixa = 20;
  fimFaixa = 40;
} 
else if (data.score <= 60) {
  inicioFaixa = 40;
  fimFaixa = 60;
} 
else if (data.score <= 80) {
  inicioFaixa = 60;
  fimFaixa = 80;
} 
else {
  inicioFaixa = 80;
  fimFaixa = 100;
}

const pontosNoNivel = data.score - inicioFaixa;
const totalNivel = fimFaixa - inicioFaixa;
const faltam = fimFaixa - data.score;

if (progressoNivelTexto) {
  progressoNivelTexto.innerText = `${pontosNoNivel} / ${totalNivel} pontos no nível`;
}

if (faltamPontosTexto) {
  if (faltam > 0) {
    faltamPontosTexto.innerText =
      `Faltam ${faltam} ponto${faltam > 1 ? "s" : ""} para o próximo nível`;
  } else {
    faltamPontosTexto.innerText = "Você pode avançar de nível 🚀";
  }
}

/* ===== FIM NOVA PARTE ===== */

if (limiteNivelTexto) {
  limiteNivelTexto.innerText =
    "Seu perfil permite até " +
    limiteMaximoNivel.toLocaleString("pt-BR", {
      style: "currency",
      currency: "BRL"
    });
}
  
    // Atualizar limite principal da tela
const limiteElemento = document.getElementById("limiteDisponivel");

if (limiteElemento && data.limiteBase) {
  limiteElemento.innerText = limiteMaximoNivel.toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
});
}

    // 🔔 MOSTRAR PEDIDO APROVADO
    if (data.statusAumento === "aprovado") {

      const info = document.createElement("div");
      info.style.marginTop = "20px";
      info.style.padding = "15px";
      info.style.background = "#1e3d2f";
      info.style.borderRadius = "10px";
      info.style.color = "white";

     info.innerHTML = `
  <strong>Pedido de aumento aprovado</strong><br>
  Limite anterior: ${data.limiteAnterior.toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  })}<br>
  Novo limite: ${data.limiteBase.toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  })}<br>
  Data da aprovação: ${data.dataAprovacao?.toDate().toLocaleString("pt-BR")}
`;
     const area = document.getElementById("areaAvisoTopo");
  area.innerHTML = "";
  area.appendChild(info);
  const fecharBtn = document.createElement("span");
fecharBtn.innerText = "✕";
fecharBtn.style.position = "absolute";
fecharBtn.style.right = "10px";
fecharBtn.style.top = "8px";
fecharBtn.style.cursor = "pointer";
fecharBtn.style.fontWeight = "bold";

info.style.position = "relative";
info.appendChild(fecharBtn);

fecharBtn.addEventListener("click", async () => {
  info.remove();

  await updateDoc(userRef, {
    statusAumento: "visualizado"
  });
});
    }
  }

  // ===== MODAL =====
  const btn = document.getElementById("btnSolicitar");
  const modal = document.getElementById("modalCredito");
  const fechar = document.getElementById("fecharModal");
  const confirmar = document.getElementById("confirmarCredito");

  if (btn && modal && fechar && confirmar) {

    const inputValor = document.getElementById("outroValor");

    inputValor.addEventListener("input", () => {

      const valor = parseInt(inputValor.value);

      if (valor < 100) {
        alert("Valor mínimo é 100.");
        inputValor.value = "";
        return;
      }
    });

    btn.addEventListener("click", () => {
      modal.style.display = "flex";
    });

    fechar.addEventListener("click", () => {
      modal.style.display = "none";
    });

    confirmar.addEventListener("click", async () => {

      const valorDigitado = parseInt(inputValor.value);
      const prazoSelecionado = document.querySelector('input[name="prazo"]:checked');

      let valorFinal = 0;
      let prazoFinal = null;

      if (valorDigitado && valorDigitado >= 100) {
        valorFinal = valorDigitado;
      } else {

        if (!prazoSelecionado) {
          alert("Escolha um prazo antes de confirmar.");
          return;
        }

        valorFinal = 100;
        prazoFinal = prazoSelecionado.value;
      }

      try {

        // cálculo simples de juros
const juros = prazoFinal == 15 ? 30 : 50;
const valorFinalComJuros = valorFinal + juros;

await addDoc(collection(db, "emprestimos"), {
  userId: user.uid,
  email: user.email,
  valor: valorFinal,
  prazo: prazoFinal,
  juros: juros,
  valorFinal: valorFinalComJuros,
  status: "aguardando",
  criadoEm: new Date(),
  dataAprovacao: null,
  dataVencimento: null
});

        alert("Solicitação enviada para análise.");
        modal.style.display = "none";

      } catch (error) {
        console.error(error);
        alert("Erro ao enviar solicitação.");
      }

    });
  }
// ===== LISTAR EMPRÉSTIMOS APROVADOS =====

const listaDiv = document.getElementById("listaEmprestimos");

const q = query(
  collection(db, "emprestimos"),
  where("userId", "==", user.uid),
  where("status", "==", "aprovado")
);

const querySnapshot = await getDocs(q);

if (querySnapshot.empty) {
  listaDiv.innerHTML = "Você não possui empréstimos ativos.";
} else {
  listaDiv.innerHTML = "";

  querySnapshot.forEach((docSnap) => {
    const dados = docSnap.data();

    const item = document.createElement("div");
    item.style.marginBottom = "10px";
    item.style.padding = "10px";
    item.style.background = "rgba(255,255,255,0.05)";
    item.style.borderRadius = "8px";

    item.innerHTML = `
      Valor: ${dados.valor.toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
      })}<br>
      Prazo: ${dados.prazo} dias<br>
      Status: ${dados.status}
    `;

    listaDiv.appendChild(item);
  });
}
});
</script>

</body>
</html>
