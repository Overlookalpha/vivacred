<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - VivaCred</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
}

.card{
  background:#1e293b;
  padding:40px;
  border-radius:12px;
  width:90%;
  max-width:350px;
  text-align:center;
}

h2{
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:none;
  border-radius:8px;
  font-size:14px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#ff7a18;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#ff5500;
}

.back{
  margin-top:15px;
  display:block;
  color:#ccc;
  font-size:12px;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="card">
  <h2>Entrar no VivaCred</h2>
  <input type="email" placeholder="Seu e-mail">
  <input type="password" placeholder="Sua senha">
  <button>Entrar</button>
  <a href="index.html" class="back">Voltar</a>
</div>
