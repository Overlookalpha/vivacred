<!DOCTYPE html>
<html>
<head>
  <title>VivaCred Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      font-family: Arial;
      background:#111;
      color:white;
      padding:20px;
    }
    .card{
      background:#1c1c1c;
      padding:15px;
      margin-bottom:15px;
      border-radius:10px;
    }
    button{
      padding:6px 12px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      margin-right:5px;
    }
    .aprovar{
      background:#00c853;
      color:white;
    }
  </style>
</head>
<body>

<h2>Painel Administrativo VivaCred</h2>

<div id="listaUsuarios"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { 
  getFirestore, 
  collection, 
  getDocs, 
  doc, 
  getDoc,
  updateDoc 
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDJHtQp7OUxgYqtcD_2eTqzh1BRpufvKrY",
  authDomain: "vivacred-5a5b8.firebaseapp.com",
  projectId: "vivacred-5a5b8",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.replace("login.html");
    return;
  }

  // 🔐 Verifica se é admin na coleção admins
  const adminRef = doc(db, "admins", user.uid);
  const adminSnap = await getDoc(adminRef);

  if (!adminSnap.exists()) {
    alert("Acesso negado.");
    window.location.replace("home.html");
    return;
  }

  console.log("Admin autenticado");

  const snapshot = await getDocs(collection(db, "usuarios"));
  const container = document.getElementById("listaUsuarios");
  container.innerHTML = "";

  snapshot.forEach((docSnap) => {
    const data = docSnap.data();
  if (data.statusAumento !== "pendente") return;
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${data.email}</strong><br>
      Score: ${data.score}<br>
      Limite Atual: ${data.limiteBase}<br>
      Limite Solicitado: ${data.limiteSolicitado}<br><br>
      <button class="aprovar" onclick="aprovar('${docSnap.id}')">Aprovar +500</button>
    `;

    container.appendChild(div);
  });

});

window.aprovar = async (id) => {

  const userRef = doc(db, "usuarios", id);
  const userSnap = await getDoc(userRef);

  const limiteAtual = userSnap.data().limiteBase;

  await updateDoc(userRef, {
    limiteBase: limiteAtual + 500
  });

  alert("Limite atualizado!");
  location.reload();
};

</script>

</body>
</html>
