<!DOCTYPE html>
<html>
<head>
  <title>VivaCred - Painel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    .header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 18px;
      letter-spacing: 2px;
      opacity: 0.7;
    }

    .logout {
      background: #ef4444;
      border: none;
      padding: 8px 15px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .container {
      padding: 30px;
      max-width: 500px;
      margin: auto;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 25px;
      border-radius: 16px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .score-value {
      font-size: 40px;
      font-weight: bold;
    }

    .bar {
      height: 10px;
      background: rgba(255,255,255,0.2);
      border-radius: 5px;
      margin-top: 10px;
    }

    .bar-fill {
      height: 10px;
      width: 20%;
      background: #22c55e;
      border-radius: 5px;
    }

    .limit {
      font-size: 24px;
      margin-top: 10px;
    }

    .btn-credit {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
    }

    .email {
      opacity: 0.7;
      font-size: 14px;
    }
    .modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.modal-content {
  background: #1e1e1e;
  padding: 20px;
  border-radius: 10px;
  width: 90%;
  max-width: 400px;
  color: white;
}

.modal-content label {
  display: block;
  margin-bottom: 10px;
}
  </style>
</head>

<body>

  <div class="header">
    <div class="logo">VIVACRED</div>
    <button id="logoutBtn" class="logout">Sair</button>
  </div>

  <div class="container">

    <div class="card">
      <div id="userEmail" class="email"></div>
    </div>
    
   <div id="areaAvisoTopo"></div>
    
    <div class="card">
      <div>Seu Score</div>
      <div class="score-value">20</div>

      <div class="bar">
        <div class="bar-fill"></div>
      </div>
    </div>

    <div class="card">
      <div>Limite Disponível</div>
      <div class="limit" id="limiteDisponivel">R$ 100,00</div>

     <button id="btnSolicitar" class="btn-credit">
     Solicitar Crédito
     </button>
    </div>

  </div>
 <div id="modalCredito" class="modal">
  <div class="modal-content">
    <h3>Simulação de Crédito</h3>

    <p>Valor padrão disponível: <strong>R$100</strong></p>

    <label>
      <input type="radio" name="prazo" value="15">
      15 dias – Total: R$130
    </label>

    <label>
      <input type="radio" name="prazo" value="30">
      30 dias – Total: R$150
    </label>

    <hr>

    <p>Ou solicitar outro valor:</p>

    <input type="number" id="outroValor" placeholder="Digite o valor desejado" min="100" />

    <br><br>

    <button id="confirmarCredito">Confirmar Solicitação</button>
    <button id="fecharModal">Cancelar</button>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {  getFirestore, doc, getDoc, setDoc, addDoc, collection  } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDJHtQp7OUxgYqtcD_2eTqzh1BRpufvKrY",
  authDomain: "vivacred-5a5b8.firebaseapp.com",
  projectId: "vivacred-5a5b8",
  storageBucket: "vivacred-5a5b8.firebasestorage.app",
  messagingSenderId: "932933359706",
  appId: "1:932933359706:web:59fd16618feea3b2fa6063"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.replace("login.html");
    return;
  }

  document.getElementById("userEmail").innerText =
    "Logado como: " + user.email;

  const userRef = doc(db, "usuarios", user.uid);
  const adminRef = doc(db, "admins", user.uid);
  const adminSnap = await getDoc(adminRef);

  if (adminSnap.exists()) {
    console.log("Usuário é ADMIN");
    document.body.style.border = "4px solid red";
  }

  const userSnap = await getDoc(userRef);

  if (!userSnap.exists()) {

    await setDoc(userRef, {
      email: user.email,
      score: 20,
      limiteBase: 100,
      status: "ativo",
      criadoEm: new Date()
    });

    console.log("Usuário criado no Firestore");

  } else {

    console.log("Usuário já existe");

    const data = userSnap.data();
    console.log("DADOS DO USUARIO:", data);
    // Atualizar limite principal da tela
const limiteElemento = document.getElementById("limiteDisponivel");

if (limiteElemento && data.limiteBase) {
  limiteElemento.innerText = data.limiteBase.toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

    // 🔔 MOSTRAR PEDIDO APROVADO
   if (data.statusAumento === "aprovado") {

  const area = document.getElementById("areaAvisoTopo");

  const info = document.createElement("div");

  info.style.background = "#1e3d2f";
  info.style.padding = "15px";
  info.style.borderRadius = "12px";
  info.style.marginBottom = "20px";
  info.style.position = "relative";
  info.style.textAlign = "center";
  info.style.boxShadow = "0 8px 20px rgba(0,0,0,0.4)";

  info.innerHTML = `
    <div style="position:absolute; right:10px; top:8px; cursor:pointer; font-weight:bold;" id="fecharAviso">✕</div>
    <strong>Pedido de aumento aprovado</strong><br><br>
    Limite anterior: ${data.limiteAnterior.toLocaleString("pt-BR", {
      style: "currency",
      currency: "BRL"
    })}<br>
    Novo limite: ${data.limiteBase.toLocaleString("pt-BR", {
      style: "currency",
      currency: "BRL"
    })}<br>
    Data da aprovação: ${data.dataAprovacao?.toDate().toLocaleString("pt-BR")}
  `;

  area.innerHTML = "";
  area.appendChild(info);

  // Botão fechar
  document.getElementById("fecharAviso").addEventListener("click", () => {
    info.remove();
  });
}

  // ===== MODAL =====
  const btn = document.getElementById("btnSolicitar");
  const modal = document.getElementById("modalCredito");
  const fechar = document.getElementById("fecharModal");
  const confirmar = document.getElementById("confirmarCredito");

  if (btn && modal && fechar && confirmar) {

    const inputValor = document.getElementById("outroValor");

    inputValor.addEventListener("input", () => {

      const valor = parseInt(inputValor.value);

      if (valor < 100) {
        alert("Valor mínimo é 100.");
        inputValor.value = "";
        return;
      }
    });

    btn.addEventListener("click", () => {
      modal.style.display = "flex";
    });

    fechar.addEventListener("click", () => {
      modal.style.display = "none";
    });

    confirmar.addEventListener("click", async () => {

      const valorDigitado = parseInt(inputValor.value);
      const prazoSelecionado = document.querySelector('input[name="prazo"]:checked');

      let valorFinal = 0;
      let prazoFinal = null;

      if (valorDigitado && valorDigitado >= 100) {
        valorFinal = valorDigitado;
      } else {

        if (!prazoSelecionado) {
          alert("Escolha um prazo antes de confirmar.");
          return;
        }

        valorFinal = 100;
        prazoFinal = prazoSelecionado.value;
      }

      try {

        await addDoc(collection(db, "solicitacoes"), {
          userId: user.uid,
          email: user.email,
          valor: valorFinal,
          prazo: prazoFinal,
          status: "pendente",
          criadoEm: new Date()
        });

        alert("Solicitação enviada para análise.");
        modal.style.display = "none";

      } catch (error) {
        console.error(error);
        alert("Erro ao enviar solicitação.");
      }

    });
  }

});
</script>

</body>
</html>
