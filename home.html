<!DOCTYPE html>
<html>
<head>
  <title>VivaCred - Painel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    .header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 18px;
      letter-spacing: 2px;
      opacity: 0.7;
    }

    .logout {
      background: #ef4444;
      border: none;
      padding: 8px 15px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .container {
      padding: 30px;
      max-width: 500px;
      margin: auto;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 25px;
      border-radius: 16px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .score-value {
      font-size: 40px;
      font-weight: bold;
    }

    .bar {
      height: 10px;
      background: rgba(255,255,255,0.2);
      border-radius: 5px;
      margin-top: 10px;
    }

    .bar-fill {
      height: 10px;
      width: 20%;
      background: #22c55e;
      border-radius: 5px;
    }

    .limit {
      font-size: 24px;
      margin-top: 10px;
    }

    .btn-credit {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
    }

    .email {
      opacity: 0.7;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="logo">VIVACRED</div>
    <button id="logoutBtn" class="logout">Sair</button>
  </div>

  <div class="container">

    <div class="card">
      <div id="userEmail" class="email"></div>
    </div>

    <div class="card">
      <div>Seu Score</div>
      <div class="score-value">20</div>

      <div class="bar">
        <div class="bar-fill"></div>
      </div>
    </div>

    <div class="card">
      <div>Limite Disponível</div>
      <div class="limit">€100</div>

      <button class="btn-credit">
        Solicitar Crédito
      </button>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    

    const firebaseConfig = {
      apiKey: "AIzaSyDJHtQp7OUxgYqtcD_2eTqzh1BRpufvKrY",
      authDomain: "vivacred-5a5b8.firebaseapp.com",
      projectId: "vivacred-5a5b8",
      storageBucket: "vivacred-5a5b8.firebasestorage.app",
      messagingSenderId: "932933359706",
      appId: "1:932933359706:web:59fd16618feea3b2fa6063"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
  if (user) {

    document.getElementById("userEmail").innerText = 
      "Logado como: " + user.email;

    const userRef = doc(db, "usuarios", user.uid);
    const userSnap = await getDoc(userRef);

    if (!userSnap.exists()) {
      await setDoc(userRef, {
        email: user.email,
        score: 20,
        limiteBase: 100,
        status: "ativo",
        criadoEm: new Date()
      });
      console.log("Usuário criado no Firestore");
    } else {
      console.log("Usuário já existe");
    }

  } else {
    window.location.replace("login.html");
  }
});
  </script>

</body>
</html>
