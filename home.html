
<!DOCTYPE html>
<html>
<head>
  <title>IsaCred - Painel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    .header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 18px;
      letter-spacing: 2px;
      opacity: 0.7;
    }

    .logout {
      background: #ef4444;
      border: none;
      padding: 8px 15px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .container {
      padding: 30px;
      max-width: 500px;
      margin: auto;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 25px;
      border-radius: 16px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .score-value {
      font-size: 40px;
      font-weight: bold;
    }

    .limit {
      font-size: 24px;
      margin-top: 10px;
    }

    .btn-credit {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
    }

    .email {
      opacity: 0.7;
      font-size: 14px;
    }
    .modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.modal-content {
  background: #1e1e1e;
  padding: 20px;
  border-radius: 10px;
  width: 90%;
  max-width: 400px;
  color: white;

  max-height: 80vh;
  overflow-y: auto;
}

.modal-content label {
  display: block;
  margin-bottom: 10px;
}
.hero-score {
  margin-top: 30px;
  padding: 40px 20px;
  border-radius: 20px;
  background: radial-gradient(circle at top left, #0f2027, #0a0f1c 70%);
  box-shadow: 0 20px 60px rgba(0, 255, 200, 0.15);
  text-align: center;
}

.hero-title {
  font-size: 12px;
  letter-spacing: 3px;
  opacity: 0.6;
}

.hero-number {
  font-size: 72px;
  font-weight: 800;
  margin-top: 10px;
  background: linear-gradient(90deg, #00ffc3, #00c853);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero-level {
  margin-top: 10px;
  font-size: 16px;
  opacity: 0.8;
}

.hero-progress {
  margin: 25px auto 10px auto;
  height: 10px;
  width: 80%;
  background: rgba(255,255,255,0.08);
  border-radius: 10px;
  overflow: hidden;
}

.hero-progress-fill {
  height: 10px;
  width: 20%;
  background: linear-gradient(90deg, #00ffc3, #00c853);
  transition: 0.4s;
}

.hero-text {
  font-size: 13px;
  opacity: 0.6;
  margin-top: 15px;
}
  </style>
</head>

<body>

  <div class="header">
    <div class="logo">ISACRED</div>
    <button id="logoutBtn" class="logout">Sair</button>
  </div>

  <div class="container">

    
    <div class="card">
      <div id="userEmail" class="email"></div>
    </div>

    <div id="areaAvisoTopo"></div>
    
  <div class="hero-score">
  <div class="hero-inner">
   <div style="margin-bottom:10px;">
  <img src="icon-192.png" style="width:60px;height:60px;border-radius:15px;">
  </div>
    <div class="hero-title">ISACRED SCORE</div>

    <div class="hero-number" id="scoreValor">20</div>

   <div class="hero-level" id="nivelTexto"></div>

    <p id="limiteNivelTexto"></p>

    <div class="hero-progress">
      <div class="hero-progress-fill" id="scoreBar"></div>
    </div>
     <p id="progressoNivelTexto" style="color: white; margin-top: 10px;"></p>
     <p id="faltamPontosTexto" style="color: #9BE8C7; font-size: 14px;"></p>
    <div class="hero-text">
      Quanto melhor seu histórico, maior seu limite.
    </div>

  </div>
</div>

    <div class="card">
      <div>Limite Disponível</div>
      <div class="limit" id="limiteDisponivel">R$ 100,00</div>

     <button id="btnSolicitar" class="btn-credit">
     Solicitar Crédito
     </button>
    </div>
     <div class="card">
  <div><strong>Meus Empréstimos</strong></div>
  <div id="listaEmprestimos" style="margin-top:15px; font-size:14px;">
    Carregando...
  </div>
<div class="card">
<strong>Minhas Parcelas</strong>
    <div id="minhasParcelas"></div>
  </div>
 <div id="modalCredito" class="modal">
  <div class="modal-content">
    <h3>Simulação de Crédito</h3>

    <p>Valor padrão disponível: <strong>R$100</strong></p>

    <label>Valor desejado:</label>
<input type="number" id="valorSimulado" placeholder="Digite o valor" min="100" />

<br><br>

<label>Quantidade de parcelas:</label>
<select id="parcelasSimuladas">
  <option value="1">1x</option>
  <option value="2">2x</option>
  <option value="3">3x</option>
  <option value="4">4x</option>
</select>

    <br><br>

<label>Seu nome completo:</label>
<input type="text" id="nomeCliente" placeholder="Digite seu nome">

<br><br>

<label>Telefone:</label>
<input type="text" id="telefoneCliente" placeholder="Digite seu telefone">

<br><br>

<label>CPF:</label>
<input type="text" id="cpfCliente" placeholder="Digite seu CPF">

<br><br>

<label>Chave Pix:</label>
<input type="text" id="pixCliente" placeholder="Digite sua chave Pix">

<hr style="margin:20px 0; opacity:0.2">

<label>Nome do avalista:</label>
<input type="text" id="nomeAvalista" placeholder="Nome do avalista">

<br><br>

<label>Telefone do avalista:</label>
<input type="text" id="telefoneAvalista" placeholder="Telefone do avalista">

<br><br>

<label>CPF do avalista:</label>
<input type="text" id="cpfAvalista" placeholder="CPF do avalista">

    <button id="confirmarCredito">Confirmar Solicitação</button>
    <button id="fecharModal">Cancelar</button>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  updateDoc,
  setDoc,
  addDoc,
  collection,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import { 
  getAuth, 
  onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
const firebaseConfig = {
  apiKey: "AIzaSyDJHtQp7OUxgYqtcD_2eTqzh1BRpufvKrY",
  authDomain: "vivacred-5a5b8.firebaseapp.com",
  projectId: "vivacred-5a5b8",
  storageBucket: "vivacred-5a5b8.firebasestorage.app",
  messagingSenderId: "932933359706",
  appId: "1:932933359706:web:59fd16618feea3b2fa6063"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let nivelNomeGlobal = null;
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.replace("login.html");
    return;
  }

  document.getElementById("userEmail").innerText =
    "Logado como: " + user.email;
  const parcelasRef = collection(db, "parcelas");
const q = query(parcelasRef, where("userId", "==", user.uid));

const snapshotParcelas = await getDocs(q);

const containerParcelas = document.getElementById("minhasParcelas");

containerParcelas.innerHTML = "";

snapshotParcelas.forEach((docSnap) => {

  const dados = docSnap.data();

  const div = document.createElement("div");
let restante = dados.valor - dados.pago;
let status = "🔴 Pendente";

const hoje = new Date();
const vencimento = dados.vencimento.toDate();

let multa = 0;
let juros = 0;

if(restante === 0){
    status = "🟢 PAGO";
}

else if(hoje > vencimento && restante > 0){

const diasAtraso = Math.floor(
(hoje - vencimento) / (1000 * 60 * 60 * 24)
);

multa = dados.valor * 0.05;
juros = dados.valor * 0.01 * diasAtraso;

restante = dados.valor + multa + juros - dados.pago;

updateDoc(doc(db,"parcelas",docSnap.id),{
multa: multa,
juros: juros,
diasAtraso: diasAtraso,
restante: restante
});

status = "⚠ ATRASADO";

}
else if(dados.pago > 0){
    status = "🟡 Parcial";
}
  
div.innerHTML =
"Parcela " + dados.numero + " - " + status + "<br>" +
"Valor: " + dados.valor + "<br>" +
"Pago: " + dados.pago + "<br>" +
"Multa: " + multa.toFixed(2) + "<br>" +
"Juros atraso: " + juros.toFixed(2) + "<br>" +
"Restante: " + restante.toFixed(2)

  containerParcelas.appendChild(div);

});
  const userRef = doc(db, "usuarios", user.uid);
  const adminRef = doc(db, "admins", user.uid);
  const adminSnap = await getDoc(adminRef);

  if (adminSnap.exists()) {
    console.log("Usuário é ADMIN");
    document.body.style.border = "4px solid red";
  }

  const userSnap = await getDoc(userRef);
 function calcularNivel(score) {

  if (score <= 20) {
    return {
      nome: "Essencial",
      emoji: "🍀",
      max: 300,
      cor: "#7ED957"
    };
  }
  else if (score <= 40) {
    return {
      nome: "Bronze",
      emoji: "🥉",
      max: 800,
      cor: "#CD7F32"
    };
  }
  else if (score <= 60) {
    return {
      nome: "Prata",
      emoji: "🥈",
      max: 1500,
      cor: "#C0C0C0"
    };
  }
  else if (score <= 80) {
    return {
      nome: "Ouro",
      emoji: "🥇",
      max: 3000,
      cor: "#FFD700"
    };
  }
  else {
    return {
      nome: "Black",
      emoji: "💎",
      max: 5000,
      cor: "#6A0DAD"
    };
  }

}
  function obterRegrasPorNivel(nivelNome) {

  const regras = {

    "Essencial": {
      maxParcelas: 2,
      juros: { 1: 0.35, 2: 0.60 }
    },

    "Bronze": {
      maxParcelas: 4,
      juros: { 1: 0.30, 2: 0.45, 3: 0.60, 4: 0.75 }
    },

    "Prata": {
      maxParcelas: 6,
      juros: { 1: 0.25, 2: 0.40, 3: 0.55, 4: 0.70, 5: 0.85, 6: 1.00 }
    },

    "Ouro": {
      maxParcelas: 8,
      juros: { 1: 0.20, 2: 0.30, 3: 0.45, 4: 0.60, 5: 0.75, 6: 0.90, 7: 1.05, 8: 1.20 }
    },

    "Black": {
      maxParcelas: 12,
      juros: { 1: 0.15, 2: 0.25, 3: 0.35, 4: 0.45, 5: 0.55, 6: 0.65, 7: 0.75, 8: 0.85, 9: 0.95, 10: 1.10, 11: 1.25, 12: 1.40 }
    }

  };

  return regras[nivelNome];
}
  if (!userSnap.exists()) {

    await setDoc(userRef, {
      email: user.email,
      score: 20,
      limiteBase: 100,
      status: "ativlo",
      criadoEm: new Date()
    });

    console.log("Usuário criado no Firestore");

  } else {

    console.log("Usuário já existe");

 const data = userSnap.data();
const dadosNivel = calcularNivel(data.score);
 const scoreValor = document.getElementById("scoreValor");

if (scoreValor) {
  scoreValor.innerText = data.score;
}

nivelNomeGlobal = dadosNivel.nome;
const regrasNivel = obterRegrasPorNivel(nivelNomeGlobal);

const selectParcelas = document.getElementById("parcelasSimuladas");

if (selectParcelas) {

  selectParcelas.innerHTML = "";

  for (let i = 1; i <= regrasNivel.maxParcelas; i++) {

    const option = document.createElement("option");

    option.value = i;
    option.textContent = i + "x";

    selectParcelas.appendChild(option);
  }

}
const nivelEmoji = dadosNivel.emoji;
const nivelCor = dadosNivel.cor;
const limiteMaximoNivel = dadosNivel.max;

const nivelTexto = document.getElementById("nivelTexto");
const limiteNivelTexto = document.getElementById("limiteNivelTexto");
const scoreBar = document.getElementById("scoreBar");
const progressoNivelTexto = document.getElementById("progressoNivelTexto");
const faltamPontosTexto = document.getElementById("faltamPontosTexto");

if (nivelTexto) {
  nivelTexto.innerText = `Nível: ${nivelEmoji} ${nivelNomeGlobal}`;
}
    
if (scoreBar) {
  let progressoNivel = 0;

  if (data.score <= 20) {
    progressoNivel = (data.score / 20) * 100;
  } 
  else if (data.score <= 40) {
    progressoNivel = ((data.score - 20) / 20) * 100;
  } 
  else if (data.score <= 60) {
    progressoNivel = ((data.score - 40) / 20) * 100;
  } 
  else if (data.score <= 80) {
    progressoNivel = ((data.score - 60) / 20) * 100;
  } 
  else {
    progressoNivel = ((data.score - 80) / 20) * 100;
  }

  scoreBar.style.width = progressoNivel + "%";
  scoreBar.style.background = nivelCor;
}

/* ===== NOVA PARTE ===== */

let inicioFaixa = 0;
let fimFaixa = 20;

if (data.score <= 20) {
  inicioFaixa = 0;
  fimFaixa = 20;
} 
else if (data.score <= 40) {
  inicioFaixa = 20;
  fimFaixa = 40;
} 
else if (data.score <= 60) {
  inicioFaixa = 40;
  fimFaixa = 60;
} 
else if (data.score <= 80) {
  inicioFaixa = 60;
  fimFaixa = 80;
} 
else {
  inicioFaixa = 80;
  fimFaixa = 100;
}

const pontosNoNivel = data.score - inicioFaixa;
const totalNivel = fimFaixa - inicioFaixa;
const faltam = fimFaixa - data.score;

if (progressoNivelTexto) {
  progressoNivelTexto.innerText = `${pontosNoNivel} / ${totalNivel} pontos no nível`;
}

if (faltamPontosTexto) {
  if (faltam > 0) {
    faltamPontosTexto.innerText =
      `Faltam ${faltam} ponto${faltam > 1 ? "s" : ""} para o próximo nível`;
  } else {
    faltamPontosTexto.innerText = "Você pode avançar de nível 🚀";
  }
}

/* ===== FIM NOVA PARTE ===== */

if (limiteNivelTexto) {
  limiteNivelTexto.innerText =
    "Seu perfil permite até " +
    limiteMaximoNivel.toLocaleString("pt-BR", {
      style: "currency",
      currency: "BRL"
    });
}
  
    // Atualizar limite principal da tela
const limiteElemento = document.getElementById("limiteDisponivel");

if (limiteElemento && data.limiteBase) {
  limiteElemento.innerText = limiteMaximoNivel.toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
});
}

    // 🔔 MOSTRAR PEDIDO APROVADO
    if (data.statusAumento === "aprovado") {

      const info = document.createElement("div");
      info.style.marginTop = "20px";
      info.style.padding = "15px";
      info.style.background = "#1e3d2f";
      info.style.borderRadius = "10px";
      info.style.color = "white";

     info.innerHTML = `
  <strong>Pedido de aumento aprovado</strong><br>
  Limite anterior: ${data.limiteAnterior.toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  })}<br>
  Novo limite: ${data.limiteBase.toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  })}<br>
  Data da aprovação: ${data.dataAprovacao?.toDate().toLocaleString("pt-BR")}
`;
     const area = document.getElementById("areaAvisoTopo");
  area.innerHTML = "";
  area.appendChild(info);
  const fecharBtn = document.createElement("span");
fecharBtn.innerText = "✕";
fecharBtn.style.position = "absolute";
fecharBtn.style.right = "10px";
fecharBtn.style.top = "8px";
fecharBtn.style.cursor = "pointer";
fecharBtn.style.fontWeight = "bold";

info.style.position = "relative";
info.appendChild(fecharBtn);

fecharBtn.addEventListener("click", async () => {
  info.remove();

  await updateDoc(userRef, {
    statusAumento: "visualizado"
  });
});
    }
  }

  // ===== MODAL =====
  const btn = document.getElementById("btnSolicitar");
  const modal = document.getElementById("modalCredito");
  const fechar = document.getElementById("fecharModal");
  const confirmar = document.getElementById("confirmarCredito");

  if (btn && modal && fechar && confirmar) {


    btn.addEventListener("click", () => {
      modal.style.display = "flex";
    });

    fechar.addEventListener("click", () => {
      modal.style.display = "none";
    });

    confirmar.addEventListener("click", async () => {

     const valorInput = document.getElementById("valorSimulado");
const parcelasSelect = document.getElementById("parcelasSimuladas");
      const nomeCliente = document.getElementById("nomeCliente").value;
const telefoneCliente = document.getElementById("telefoneCliente").value;
const cpfCliente = document.getElementById("cpfCliente").value;
const pixCliente = document.getElementById("pixCliente").value;

const nomeAvalista = document.getElementById("nomeAvalista").value;
const telefoneAvalista = document.getElementById("telefoneAvalista").value;
const cpfAvalista = document.getElementById("cpfAvalista").value;

const valorFinal = parseInt(valorInput.value);
const parcelasFinal = parseInt(parcelasSelect.value);

if (!valorFinal || valorFinal < 100) {
  alert("Valor mínimo é 100.");
  return;
}

      try {

const regras = obterRegrasPorNivel(nivelNomeGlobal);

if (parcelasFinal > regras.maxParcelas) {
  alert("Seu perfil não permite essa quantidade de parcelas.");
  return;
}

const taxa = regras.juros[parcelasFinal];

if (!taxa) {
  alert("Parcelamento inválido para seu perfil.");
  return;
}

const juros = valorFinal * taxa;
const valorFinalComJuros = valorFinal + juros;

await addDoc(collection(db, "emprestimos"), {
  userId: user.uid,
  email: user.email,

  nomeCliente: nomeCliente,
  telefoneCliente: telefoneCliente,
  cpfCliente: cpfCliente,
  pixCliente: pixCliente,

  nomeAvalista: nomeAvalista,
  telefoneAvalista: telefoneAvalista,
  cpfAvalista: cpfAvalista,

  valor: valorFinal,
  parcelas: Number(parcelasFinal),
  juros: juros,
  valorFinal: valorFinalComJuros,

  status: "aguardando",
  criadoEm: new Date(),
  dataAprovacao: null,
  dataVencimento: null
});

        alert("Solicitação enviada para análise.");
        modal.style.display = "none";

      } catch (error) {
        console.error(error);
        alert("Erro ao enviar solicitação.");
      }

    });
  }
// ===== LISTAR EMPRÉSTIMOS APROVADOS =====

const listaDiv = document.getElementById("listaEmprestimos");

const qEmprestimos = query(
  collection(db, "emprestimos"),
  where("userId", "==", user.uid),
  where("status", "==", "ativo")
);

const querySnapshot = await getDocs(qEmprestimos);

if (querySnapshot.empty) {

  listaDiv.innerHTML = "Você não possui empréstimos ativos.";

} else {

  listaDiv.innerHTML = "";

  querySnapshot.forEach((docSnap) => {

    const dados = docSnap.data();

    const valorParcela = Number(
      (dados.valorFinal / dados.parcelas).toFixed(2)
    );

    const hoje = new Date();

    let parcelasHTML = "";

   for (let i = 1; i <= dados.parcelas; i++) {

  const dataVencimento = new Date(hoje);
  dataVencimento.setMonth(hoje.getMonth() + i);

  let status = "🔴 PENDENTE";

  const parcelaPaga = snapshotParcelas.docs.find(p => {
    const d = p.data();
    return d.numero === i && d.pago >= d.valor;
  });

  if (parcelaPaga) {
    status = "🟢 PAGO";
  }

  parcelasHTML +=
    "Parcela " + i +
    " - " +
    valorParcela.toLocaleString("pt-BR", {
      style: "currency",
      currency: "BRL"
    }) +
    " - " + status +
    " - Vencimento: " +
    dataVencimento.toLocaleDateString("pt-BR") +
    "<br>";
}

    const item = document.createElement("div");
    item.style.marginBottom = "15px";
    item.style.padding = "12px";
    item.style.background = "rgba(255,255,255,0.05)";
    item.style.borderRadius = "10px";

    item.innerHTML =
      "<strong>Valor Total:</strong> " +
      dados.valorFinal.toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
      }) +
      "<br>" +
      "<strong>Parcelas:</strong> " +
      dados.parcelas +
      "<br><br>" +
      parcelasHTML;

    listaDiv.appendChild(item);

  });

  }
 });
</script>

</body>
</html>
