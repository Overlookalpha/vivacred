<!DOCTYPE html>
<html>
<head>
  <title>VivaCred</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 16px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 28px;
      letter-spacing: 1px;
    }

    .email {
      opacity: 0.8;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .btn {
      padding: 12px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn-logout {
      background: #ef4444;
      color: white;
    }

    .btn-logout:hover {
      background: #dc2626;
    }

    .logo {
      font-size: 18px;
      opacity: 0.7;
      margin-bottom: 5px;
      letter-spacing: 2px;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="logo">VIVACRED</div>
    <h1>Painel do Cliente</h1>
    <div id="userEmail" class="email"></div>

    <button id="logoutBtn" class="btn btn-logout">
      Sair
    </button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDJHtQp7OUxgYqtcD_2eTqzh1BRpufvKrY",
      authDomain: "vivacred-5a5b8.firebaseapp.com",
      projectId: "vivacred-5a5b8",
      storageBucket: "vivacred-5a5b8.firebasestorage.app",
      messagingSenderId: "932933359706",
      appId: "1:932933359706:web:59fd16618feea3b2fa6063"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById("userEmail").innerText = "Logado como: " + user.email;
      } else {
        window.location.replace("login.html");
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await signOut(auth);
      window.location.replace("login.html");
    });

  </script>

</body>
</html>
