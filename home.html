<!DOCTYPE html>
<html>
<head>
  <title>VivaCred - Painel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    .header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 18px;
      letter-spacing: 2px;
      opacity: 0.7;
    }

    .logout {
      background: #ef4444;
      border: none;
      padding: 8px 15px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .container {
      padding: 30px;
      max-width: 500px;
      margin: auto;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 25px;
      border-radius: 16px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .score-value {
      font-size: 40px;
      font-weight: bold;
    }

    .bar {
      height: 10px;
      background: rgba(255,255,255,0.2);
      border-radius: 5px;
      margin-top: 10px;
    }

    .bar-fill {
      height: 10px;
      width: 20%;
      background: #22c55e;
      border-radius: 5px;
    }

    .limit {
      font-size: 24px;
      margin-top: 10px;
    }

    .btn-credit {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
    }

    .email {
      opacity: 0.7;
      font-size: 14px;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .modal-content {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 10px;
      width: 90%;
      max-width: 400px;
      color: white;
    }

    .modal-content label {
      display: block;
      margin-bottom: 10px;
    }

    .aviso-aprovado {
      background: #1e3d2f;
      padding: 18px;
      border-radius: 14px;
      margin-bottom: 20px;
      position: relative;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      animation: fadeIn 0.4s ease-in-out;
    }

    .fechar-aviso {
      position: absolute;
      right: 12px;
      top: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 18px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<div class="header">
  <div class="logo">VIVACRED</div>
  <button id="logoutBtn" class="logout">Sair</button>
</div>

<div class="container">

  <div class="card">
    <div id="userEmail" class="email"></div>
  </div>

  <!-- 🔔 AVISO FICA AQUI -->
  <div id="areaAvisoTopo"></div>

  <div class="card">
    <div>Seu Score</div>
    <div class="score-value">20</div>
    <div class="bar">
      <div class="bar-fill"></div>
    </div>
  </div>

  <div class="card">
    <div>Limite Disponível</div>
    <div class="limit" id="limiteDisponivel">R$ 100,00</div>
    <button id="btnSolicitar" class="btn-credit">Solicitar Crédito</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "vivacred-5a5b8.firebaseapp.com",
  projectId: "vivacred-5a5b8",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.replace("login.html");
    return;
  }

  document.getElementById("userEmail").innerText =
    "Logado como: " + user.email;

  const userRef = doc(db, "usuarios", user.uid);
  const userSnap = await getDoc(userRef);

  if (!userSnap.exists()) return;

  const data = userSnap.data();

  // Atualizar limite
  if (data.limiteBase) {
    document.getElementById("limiteDisponivel").innerText =
      data.limiteBase.toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
      });
  }

  // 🔔 Aviso aprovado
  if (data.statusAumento === "aprovado") {

    const area = document.getElementById("areaAvisoTopo");
    area.innerHTML = "";

    const aviso = document.createElement("div");
    aviso.className = "aviso-aprovado";

    aviso.innerHTML = `
      <div class="fechar-aviso" id="fecharAviso">✕</div>
      <strong>Pedido de aumento aprovado</strong><br><br>
      Limite anterior: ${(data.limiteAnterior || 0).toLocaleString("pt-BR", {style:"currency",currency:"BRL"})}<br>
      Novo limite: ${(data.limiteBase || 0).toLocaleString("pt-BR", {style:"currency",currency:"BRL"})}<br>
      Data da aprovação: ${data.dataAprovacao?.toDate().toLocaleString("pt-BR") || ""}
    `;

    area.appendChild(aviso);

    document.getElementById("fecharAviso").addEventListener("click", () => {
      aviso.remove();
    });
  }

});
</script>

</body>
</html>
