<!DOCTYPE html>
<html>
<head>
  <title>VivaCred Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      font-family: Arial;
      background:#111;
      color:white;
      padding:20px;
    }
    .card{
      background:#1c1c1c;
      padding:15px;
      margin-bottom:15px;
      border-radius:10px;
    }
    button{
      padding:6px 12px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      margin-right:5px;
    }
    .aprovar{
      background:#00c853;
      color:white;
    }
  </style>
</head>
<body>

<h2>Painel Administrativo VivaCred</h2>

<div id="listaUsuarios"></div>
<h3>Solicitações de Empréstimo</h3>
<div id="listaEmprestimos"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { 
  getFirestore, 
  collection, 
  getDocs, 
  doc, 
  getDoc,
  updateDoc 
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDJHtQp7OUxgYqtcD_2eTqzh1BRpufvKrY",
  authDomain: "vivacred-5a5b8.firebaseapp.com",
  projectId: "vivacred-5a5b8",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    console.log("Email logado:", user.email);
    console.log("UID logado:", user.uid);
    window.location.replace("login.html");
    return;
  }

  // 🔐 Verifica se é admin na coleção admins
 let adminSnap;

try {
  const adminRef = doc(db, "admins", user.uid);
  adminSnap = await getDoc(adminRef);
} catch (error) {
  console.error("Erro ao verificar admin:", error);
  alert("Erro de permissão no Firestore.");
  return;
}

if (!adminSnap.exists()) {
  alert("Acesso negado.");
  window.location.replace("home.html");
  return;
}

  console.log("Admin autenticado");

  const snapshot = await getDocs(collection(db, "usuarios"));
  const container = document.getElementById("listaUsuarios");
  container.innerHTML = "";

  snapshot.forEach((docSnap) => {
    const data = docSnap.data();
  if (data.statusAumento !== "pendente") return;
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${data.email}</strong><br>
      Score: ${data.score}<br>
      Limite Atual: ${data.limiteBase}<br>
      Limite Solicitado: ${data.limiteSolicitado}<br><br>
      <button class="aprovar" onclick="aprovar('${docSnap.id}', ${data.limiteSolicitado})">
       Aprovar Pedido
       </button>
    `;

    container.appendChild(div);
  });
// ===== LISTAR EMPRÉSTIMOS AGUARDANDO =====

const emprestimosSnapshot = await getDocs(collection(db, "emprestimos"));
const containerEmprestimos = document.getElementById("listaEmprestimos");
containerEmprestimos.innerHTML = "";

emprestimosSnapshot.forEach((docSnap) => {

  const dados = docSnap.data();

  if (dados.status !== "aguardando") return;

  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <strong>${dados.email}</strong><br>
    Valor: ${dados.valor}<br>
    Prazo: ${dados.prazo} dias<br>
    Juros: ${dados.juros}<br><br>
    <button class="aprovar" onclick="aprovarEmprestimo('${docSnap.id}')">
      Aprovar Empréstimo
    </button>
  `;

  containerEmprestimos.appendChild(div);
});
});

window.aprovar = async (id) => {

  const userRef = doc(db, "usuarios", id);
 const userSnap = await getDoc(userRef);

if (!userSnap.exists()) {
  alert("Usuário não encontrado.");
  return;
}

const data = userSnap.data();

  const limiteAnterior = data.limiteBase;
  const novoLimite = data.limiteSolicitado;

  await updateDoc(userRef, {
    limiteBase: novoLimite,
    limiteAnterior: limiteAnterior,
    statusAumento: "aprovado",
    dataAprovacao: new Date()
  });

  alert("Pedido aprovado!");
  location.reload();
};
window.aprovarEmprestimo = async (id) => {

  const emprestimoRef = doc(db, "emprestimos", id);

 const hoje = new Date();
const vencimento = new Date();
vencimento.setDate(hoje.getDate() + 30);

await updateDoc(emprestimoRef, {
  status: "aprovado",
  dataAprovacao: hoje,
  dataVencimento: vencimento
});

  alert("Empréstimo aprovado!");
  location.reload();
};
</script>

</body>
</html>
