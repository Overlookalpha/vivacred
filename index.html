<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VivaCred</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:Arial, sans-serif;
  color:white;
  text-align:center;
  background-image:url("https://images.unsplash.com/photo-1605902711622-cfb43c4437b5");
  background-size:cover;
  background-position:center;
  position:relative;
}

body::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.65);
}

.container{
  position:relative;
  z-index:2;
}

h1{
  font-size:3rem;
  letter-spacing:2px;
}

.tag{
  margin-top:15px;
  font-size:1rem;
  opacity:0.8;
}
  .btn{
  display:inline-block;
  padding:12px 28px;
  background:#ff7a18;
  color:white;
  text-decoration:none;
  border-radius:8px;
  font-weight:bold;
  transition:0.3s;
}

.btn:hover{
  background:#ff5500;
}
</style>
</head>

<body>

<div class="container">
  <h1>VivaCred 🔥</h1>
  <div class="tag">Crédito inteligente começa aqui</div>

  <br><br>

  <a href="login.html" class="btn">Entrar</a>
</div>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
